<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nanta Tech Limited - Stock LED</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    * {
      font-weight: 900;
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
    }

    body {
      background: black;
      font-family: "Consolas", "Courier New", monospace;
      text-align: center;
      color: white;
    }

    .container {
      padding-top: 4vh;
    }

    #symbol {
      font-size: 3.2em;
      letter-spacing: 0.4vh;
      margin-bottom: 2vh;
      color: #E6A64B;
      -webkit-text-stroke: 0.20vh #E6A64B;
      text-shadow: 0 0 1.2vh rgba(230, 166, 75, 0.35);
    }

    .price-row {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 3vw;
    }

    #price {
      font-size: 18vh;
      color: #00ff66;
    }

    #change {
      font-size: 9vh;
    }

    .up { color: #00ff66; }
    .down { color: #ff3333; }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2vw;
      margin-top: 4vh;
      padding: 0 5%;
      flex-wrap: nowrap;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-label {
      font-size: 7.5vh;
      color: #888;
      margin-bottom: 0.5vh;
    }

    .stat-value {
      font-size: 9vh;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">

    <div id="symbol">NANTA TECH LIMITED</div>

    <div class="price-row">
      <div id="price">₹276.75</div>
      <div id="change" class="up">+26.00 (+8.67%)</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">PRE</div><div class="stat-value">300.35</div></div>
      <div class="stat"><div class="stat-label">OPEN</div><div class="stat-value">302.00</div></div>
      <div class="stat"><div class="stat-label">HIGH</div><div class="stat-value">340.20</div></div>
      <div class="stat"><div class="stat-label">LOW</div><div class="stat-value">234.50</div></div>
      <div class="stat"><div class="stat-label">CLOSE</div><div class="stat-value">302.75</div></div>
      <div class="stat"><div class="stat-label">VWAP</div><div class="stat-value">365.10</div></div>
    </div>

  </div>

</body>
</html>
